# This file prepares the stable public bridge contract but intentionally contains
# no key material, RPC endpoint, admin secret, or resolver credential. Configure
# those as managed Worker secrets before deploying; the bridge fails closed until
# every required value is present.
name = "warpkeep-auth-bridge"
main = "src/index.ts"
compatibility_date = "2026-07-11"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[vars]
ENVIRONMENT = "production"
ISSUER = "https://auth.warpkeep.com"
ALLOWED_ORIGINS = "https://warpkeep.com"
FARCASTER_DOMAIN = "warpkeep.com"
FARCASTER_SIWE_URI = "https://warpkeep.com/"
OIDC_AUDIENCE = "warpkeep-spacetimedb"
OIDC_KEY_ID = "warpkeep-alpha-2026-07-01"
SPACETIMEDB_URI = "https://maincloud.spacetimedb.com"
SPACETIMEDB_DATABASE = "warpkeep-89e4u"
PUBLIC_AUTH_ENABLED = "false"
QA_OBSERVER_ENABLED = "false"

[[routes]]
pattern = "auth.warpkeep.com"
custom_domain = true

[[durable_objects.bindings]]
name = "CHALLENGE_REPLAY_GUARD"
class_name = "ChallengeReplayGuard"

[[durable_objects.bindings]]
name = "QA_CHALLENGE_REPLAY_GUARD"
class_name = "QaChallengeReplayGuard"

[[durable_objects.bindings]]
name = "AUTH_RATE_LIMITER"
class_name = "AuthRateLimiter"

[[durable_objects.bindings]]
name = "SESSION_FAMILIES"
class_name = "SessionFamily"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChallengeReplayGuard"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["AuthRateLimiter"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["SessionFamily"]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["QaChallengeReplayGuard"]

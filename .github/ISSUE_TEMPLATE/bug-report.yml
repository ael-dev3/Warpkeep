name: Bug report
description: Report a reproducible Warpkeep product or documentation problem without private data.
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve Warpkeep. Report only public product behavior or synthetic/local reproduction details.

        **Do not include or attach tokens, proofs, QR payloads, wallet or account identifiers, private logs, personal data, or credentialed URLs.** For a security-sensitive problem, stop and follow [SECURITY.md](https://github.com/ael-dev3/Warpkeep/security/policy).
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      description: Where did the problem occur?
      options:
        - Live Alpha at warpkeep.com
        - Local development checkout
        - Documentation or repository workflow
        - Other public Warpkeep surface
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or public build
      description: Use the visible Alpha version, public release identifier, or commit SHA. Do not paste a credentialed URL.
      placeholder: Alpha 0.3.8 · BUILD abc1234
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: What happened?
      description: Describe the visible problem and its impact using public or synthetic context only.
      render: text
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Give the smallest safe sequence that reproduces the problem. Never reproduce against another person or include private evidence.
      placeholder: |
        1. Open...
        2. Select...
        3. Observe...
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What clear, player-facing result did you expect?
      render: text
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      options:
        - Every time
        - Often
        - Once so far
        - Unknown
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy and safety check
      options:
        - label: I removed tokens, proofs, QR payloads, wallet or account identifiers, private logs, personal data, and credentialed URLs; this report contains only public or synthetic information.
          required: true
        - label: This is not a security vulnerability. I will follow SECURITY.md instead for security-sensitive behavior.
          required: true

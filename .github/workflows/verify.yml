name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, feat/spacetimedb-basic-connection, security/alpha-0.2-preflight, ops/alpha-0.2-live-activation]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Build GitHub Pages variant
        run: GITHUB_PAGES=true npm run build

      - name: Build canonical custom-domain Pages variant
        run: GITHUB_PAGES=true DEPLOY_BASE=/ npm run build

      - name: Audit dependencies
        run: |
          npm audit
          npm audit signatures

  auth-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0

      - name: Install bridge dependencies
        run: pnpm --dir services/auth-bridge install --frozen-lockfile

      - name: Verify bridge
        run: pnpm --dir services/auth-bridge run check

      - name: Audit bridge dependencies
        run: pnpm --dir services/auth-bridge audit --audit-level high

  spacetimedb-module:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0

      - name: Install root dependencies for generated client verification
        run: npm ci

      - name: Install module dependencies
        run: pnpm --dir spacetimedb install --frozen-lockfile

      - name: Install pinned SpacetimeDB CLI
        env:
          SPACETIMEDB_CLI_SHA256: cb03bb4706dc6bd6ef080c9bbd220a6e7d10430a65e7be2ba6be27ec7e3a9118
          SPACETIMEDB_CLI_VERSION: 2.6.1
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/spacetime-${SPACETIMEDB_CLI_VERSION}.tar.gz"
          bin_dir="$RUNNER_TEMP/spacetime-bin"
          curl --fail --location --proto '=https' --tlsv1.2 --retry 3 \
            --output "$archive" \
            "https://github.com/clockworklabs/SpacetimeDB/releases/download/v${SPACETIMEDB_CLI_VERSION}/spacetime-x86_64-unknown-linux-gnu.tar.gz"
          echo "${SPACETIMEDB_CLI_SHA256}  ${archive}" | sha256sum --check --strict -
          mkdir -p "$bin_dir"
          tar -xzf "$archive" -C "$bin_dir" spacetimedb-cli spacetimedb-standalone
          mv "$bin_dir/spacetimedb-cli" "$bin_dir/spacetime"
          echo "$bin_dir" >> "$GITHUB_PATH"
          "$bin_dir/spacetime" --version

      - name: Verify module and generated bindings
        run: |
          pnpm --dir spacetimedb run verify
          npm run stdb:verify-bindings

      - name: Audit module dependencies
        run: pnpm --dir spacetimedb audit --audit-level high

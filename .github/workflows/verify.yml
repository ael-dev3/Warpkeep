name: Verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scan repository history for secrets
        env:
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/gitleaks-${GITLEAKS_VERSION}.tar.gz"
          bin_dir="$RUNNER_TEMP/gitleaks-bin"
          curl --fail --location --proto '=https' --tlsv1.2 --retry 3 \
            --output "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum --check --strict -
          mkdir -p "$bin_dir"
          tar -xzf "$archive" -C "$bin_dir" gitleaks
          "$bin_dir/gitleaks" git --config .gitleaks.toml --redact --no-banner .

      - name: Verify licensing transition state
        run: npm run verify:licenses

      - name: Verify runtime asset integrity and repository size policy
        run: |
          npm run verify:runtime-assets
          npm run verify:file-sizes

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Build GitHub Pages variant
        run: GITHUB_PAGES=true npm run build

      - name: Build canonical custom-domain Pages variant
        run: GITHUB_PAGES=true DEPLOY_BASE=/ npm run build

      - name: Audit dependencies
        run: |
          npm audit
          npm audit signatures

  auth-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0

      - name: Install bridge dependencies
        run: pnpm --dir services/auth-bridge install --frozen-lockfile

      - name: Verify bridge
        run: pnpm --dir services/auth-bridge run check

      - name: Audit bridge dependencies
        run: pnpm --dir services/auth-bridge audit --audit-level high

  spacetimedb-module:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0

      - name: Install root dependencies for generated client verification
        run: npm ci

      - name: Install module dependencies
        run: pnpm --dir spacetimedb install --frozen-lockfile

      - name: Install pinned SpacetimeDB CLI
        env:
          SPACETIMEDB_CLI_SHA256: cb03bb4706dc6bd6ef080c9bbd220a6e7d10430a65e7be2ba6be27ec7e3a9118
          SPACETIMEDB_CLI_VERSION: 2.6.1
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/spacetime-${SPACETIMEDB_CLI_VERSION}.tar.gz"
          bin_dir="$RUNNER_TEMP/spacetime-bin"
          curl --fail --location --proto '=https' --tlsv1.2 --retry 3 \
            --output "$archive" \
            "https://github.com/clockworklabs/SpacetimeDB/releases/download/v${SPACETIMEDB_CLI_VERSION}/spacetime-x86_64-unknown-linux-gnu.tar.gz"
          echo "${SPACETIMEDB_CLI_SHA256}  ${archive}" | sha256sum --check --strict -
          mkdir -p "$bin_dir"
          tar -xzf "$archive" -C "$bin_dir" spacetimedb-cli spacetimedb-standalone
          mv "$bin_dir/spacetimedb-cli" "$bin_dir/spacetime"
          echo "$bin_dir" >> "$GITHUB_PATH"
          "$bin_dir/spacetime" --version

      - name: Verify module and generated bindings
        run: |
          pnpm --dir spacetimedb run verify
          npm run stdb:verify-bindings
          npm run stdb:verify-additive-migration

      - name: Audit module dependencies
        run: pnpm --dir spacetimedb audit --audit-level high

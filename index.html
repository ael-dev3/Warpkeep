<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      data-warpkeep-production-csp
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; base-uri 'none'; object-src 'none'; frame-src 'none'; form-action 'none'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-eval'; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' blob: https://auth.warpkeep.com https://relay.farcaster.xyz https://mainnet.optimism.io https://maincloud.spacetimedb.com wss://maincloud.spacetimedb.com https://imagedelivery.net https://wrpcd.net https://res.cloudinary.com https://i.imgur.com https://lh3.googleusercontent.com https://i.seadn.io; worker-src 'self' blob:; manifest-src 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Warpkeep is a persistent Farcaster strategy world where every admitted founder has a castle in Genesis 001."
    />
    <meta name="referrer" content="no-referrer" />
    <meta name="theme-color" content="#010207" />
    <meta name="color-scheme" content="dark" />
    <link rel="canonical" href="https://warpkeep.com/" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta property="og:title" content="Warpkeep" />
    <meta
      property="og:description"
      content="Warpkeep is a persistent Farcaster strategy world where every admitted founder has a castle in Genesis 001."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://warpkeep.com/" />
    <meta property="og:site_name" content="Warpkeep" />
    <link rel="stylesheet" href="/warpkeep-boot.css" />
    <title>Warpkeep</title>
  </head>
  <body>
    <div id="root">
      <main
        aria-busy="true"
        aria-label="Warpkeep is opening"
        class="warpkeep-boot"
      >
        <div class="warpkeep-boot__panel">
          <div aria-hidden="true" class="warpkeep-boot__sigil">W</div>
          <p class="warpkeep-boot__eyebrow">HEGEMONY SYSTEM</p>
          <p aria-live="polite" class="warpkeep-boot__message" role="status">
            Opening the realm…
          </p>
        </div>
      </main>
    </div>
    <noscript>
      <link rel="stylesheet" href="/warpkeep-noscript.css" />
      <main
        aria-describedby="warpkeep-noscript-copy"
        aria-labelledby="warpkeep-noscript-title"
        class="warpkeep-boot warpkeep-boot--noscript"
      >
        <div class="warpkeep-boot__panel">
          <div aria-hidden="true" class="warpkeep-boot__sigil">W</div>
          <p class="warpkeep-boot__eyebrow">REALM ACCESS PAUSED</p>
          <h1 class="warpkeep-boot__title" id="warpkeep-noscript-title">
            WARPKEEP REQUIRES JAVASCRIPT
          </h1>
          <p class="warpkeep-boot__message" id="warpkeep-noscript-copy">
            Enable JavaScript in this browser, then reload the page to enter the realm.
          </p>
        </div>
      </main>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

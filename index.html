<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Warpkeep: Every FID has a castle." />
    <meta name="referrer" content="no-referrer" />
    <meta name="theme-color" content="#010207" />
    <meta name="color-scheme" content="dark" />
    <link rel="canonical" href="https://warpkeep.com/" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta property="og:title" content="Warpkeep" />
    <meta property="og:description" content="Warpkeep: Every FID has a castle." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://warpkeep.com/" />
    <meta property="og:site_name" content="Warpkeep" />
    <link rel="stylesheet" href="/warpkeep-boot.css" />
    <title>Warpkeep</title>
  </head>
  <body>
    <div id="root">
      <main
        aria-busy="true"
        aria-label="Warpkeep is opening"
        class="warpkeep-boot"
      >
        <div class="warpkeep-boot__panel">
          <div aria-hidden="true" class="warpkeep-boot__sigil">W</div>
          <p class="warpkeep-boot__eyebrow">HEGEMONY SYSTEM</p>
          <p aria-live="polite" class="warpkeep-boot__message" role="status">
            Opening the realm…
          </p>
        </div>
      </main>
    </div>
    <noscript>
      <link rel="stylesheet" href="/warpkeep-noscript.css" />
      <main
        aria-describedby="warpkeep-noscript-copy"
        aria-labelledby="warpkeep-noscript-title"
        class="warpkeep-boot warpkeep-boot--noscript"
      >
        <div class="warpkeep-boot__panel">
          <div aria-hidden="true" class="warpkeep-boot__sigil">W</div>
          <p class="warpkeep-boot__eyebrow">REALM ACCESS PAUSED</p>
          <h1 class="warpkeep-boot__title" id="warpkeep-noscript-title">
            WARPKEEP REQUIRES JAVASCRIPT
          </h1>
          <p class="warpkeep-boot__message" id="warpkeep-noscript-copy">
            Enable JavaScript in this browser, then reload the page to enter the realm.
          </p>
        </div>
      </main>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
